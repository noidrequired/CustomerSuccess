function initTagSel(formId,initialTags){tagSelState[formId]=new Set(initialTags||[]);}
function getTagSel(formId){return[...(tagSelState[formId]||new Set())];}
function toggleTagSel(formId,tag){if(!tagSelState[formId])tagSelState[formId]=new Set();if(tagSelState[formId].has(tag))tagSelState[formId].delete(tag);else tagSelState[formId].add(tag);refreshTagSel(formId);}
function refreshTagSel(formId){const sel=tagSelState[formId]||new Set();const display=document.getElementById(`tsd-${formId}`);const dropdown=document.getElementById(`tdd-${formId}`);if(!display)return;const activeTlist=[...customTags].filter(t=>activeTags.has(t));display.innerHTML=sel.size===0?`<span style="color:var(--ink3);font-size:12px">Select tags…</span>`:[...sel].map(t=>`<span class="tag-pill-sel">${t}<span class="rem" onclick="event.stopPropagation();toggleTagSel('${formId}','${t}')">×</span></span>`).join('');if(dropdown)dropdown.innerHTML=activeTlist.length?activeTlist.map(t=>`<div class="tag-dropdown-item${sel.has(t)?' selected':''}" onclick="event.stopPropagation();toggleTagSel('${formId}','${t}')"><div class="chk-box"></div>${t}</div>`).join(''):`<div style="padding:10px 12px;font-size:12px;color:var(--ink3)">No active tags.</div>`;}
function openTagSel(formId){const display=document.getElementById(`tsd-${formId}`);const dropdown=document.getElementById(`tdd-${formId}`);if(!display||!dropdown)return;const isOpen=dropdown.classList.contains('open');document.querySelectorAll('.tag-dropdown.open').forEach(d=>d.classList.remove('open'));document.querySelectorAll('.tag-select-display.open').forEach(d=>d.classList.remove('open'));if(!isOpen){dropdown.classList.add('open');display.classList.add('open');}}
document.addEventListener('click',()=>{document.querySelectorAll('.tag-dropdown.open').forEach(d=>d.classList.remove('open'));});
function buildTagSelectHTML(formId,initialTags){initTagSel(formId,initialTags);const sel=tagSelState[formId]||new Set();const activeTlist=[...customTags].filter(t=>activeTags.has(t));const displayInner=sel.size===0?`<span style="color:var(--ink3);font-size:12px">Select tags…</span>`:[...sel].map(t=>`<span class="tag-pill-sel">${t}<span class="rem" onclick="event.stopPropagation();toggleTagSel('${formId}','${t}')">×</span></span>`).join('');const dropdownItems=activeTlist.length?activeTlist.map(t=>`<div class="tag-dropdown-item${sel.has(t)?' selected':''}" onclick="event.stopPropagation();toggleTagSel('${formId}','${t}')"><div class="chk-box"></div>${t}</div>`).join(''):`<div style="padding:10px 12px;font-size:12px;color:var(--ink3)">No active tags.</div>`;return`<div class="tag-select-wrap"><div class="tag-select-display" id="tsd-${formId}" onclick="event.stopPropagation();openTagSel('${formId}')" style="min-height:32px;padding:4px 8px;border-radius:var(--r-md);border:1px solid var(--line2);background:var(--bg3);cursor:pointer;display:flex;align-items:center;gap:5px;flex-wrap:wrap">${displayInner}</div><div class="tag-dropdown" id="tdd-${formId}" style="display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--bg2);border:1px solid var(--line2);border-radius:var(--r-lg);z-index:200;box-shadow:0 8px 24px rgba(0,0,0,.4);overflow:hidden">${dropdownItems}</div></div>`;}

function buildMetrics(src){
  const tot=src.length,op=src.filter(t=>t.status==='open').length;
  const p0t=src.filter(t=>t.pri==='P0').length,p0o=src.filter(t=>t.pri==='P0'&&t.status==='open').length;
  const met=src.filter(t=>t.owner==='Me').length,meo=src.filter(t=>t.owner==='Me'&&t.status==='open').length;
  const od=src.filter(t=>isOverdue(t)).length;
  const card=(l,o,t,s)=>`<div class="metric"><div class="m-lbl">${l}</div><div class="m-row"><span class="m-open">${o}</span><span class="m-sep">/</span><span class="m-tot">${t}</span></div><div class="m-sub">${s}</div></div>`;
  return`<div class="metrics">${card('Tasks',op,tot,'<span style="color:var(--red)">open</span> / <span style="color:var(--blue)">total</span>')}${card('P0 Tasks',p0o,p0t,'<span style="color:var(--red)">open</span> / <span style="color:var(--blue)">total</span>')}${card('Assigned to me',meo,met,'<span style="color:var(--red)">open</span> / <span style="color:var(--blue)">total</span>')}<div class="metric"><div class="m-lbl">Overdue</div><div class="m-row"><span class="m-single" style="color:${od>0?'var(--red)':'var(--ink3)'}">${od}</span></div><div class="m-sub">open tasks past due</div></div></div>`;
}
function buildFilterBar(){
  const sf=['open','completed','all'].map(s=>`<span class="fc${fStat===s?' on':''}" onclick="setFS('${s}')">${s[0].toUpperCase()+s.slice(1)}</span>`).join('');
  const pf=PRIS.map(p=>`<span class="fc${fPri.includes(p)?' on':''}" onclick="togFPri('${p}')">${p}</span>`).join('');
  const of_=OWNERS.map(o=>`<span class="fc${fOwn.includes(o)?' on':''}" onclick="togFOwn(\`${o}\`)">${o}</span>`).join('');
  const qf=customFilters.map(f=>`<span class="fc" onclick="applyCustomFilter('${f.id}')">${f.name}</span>`).join('');
  return`<div class="fbar">${sf}<span style="width:1px;height:14px;background:var(--line2);flex-shrink:0"></span>${pf}<span style="width:1px;height:14px;background:var(--line2);flex-shrink:0"></span>${of_}${qf?'<span style="width:1px;height:14px;background:var(--line2);flex-shrink:0"></span>'+qf:''}</div>`;
}

// task row — no Edit hover button
function buildTaskRow(t,showCust=true,isExternal=false){
  const c=gc(t.cust),dn=t.status==='completed';
  const {dc,dt}=dueMeta(t.due);
  const sd=(t.subs||[]).filter(s=>s.done).length;
  const cna=(t.contactIds||[]).length;
  const clickFn=isExternal?`openExtTDP(${t.id})`:`openTDP(${t.id})`;
  const chkFn=isExternal?`togDoneExt(${t.id})`:`togDone(${t.id})`;
  return`<div class="task-row${dn?' done':''}" onclick="${clickFn}">
    <div class="chk${dn?' on':''}" onclick="event.stopPropagation();${chkFn}"></div>
    <div class="tr-body">
      <div class="tr-name${dn?' done':''}">${t.title}</div>
      <div class="tr-meta">
        ${priTag(t.pri)}${showCust&&!isExternal?custTag(c):''}
        ${ownerTag(t.owner)}
        <span class="mchip" style="color:${dc}">${dt}</span>
        <span class="mchip" style="color:var(--ink3)">Created ${t.created}</span>
        ${durationChip(t)}
        ${t.subs&&t.subs.length?`<span class="mchip">${sd}/${t.subs.length} sub-tasks</span>`:''}
        ${cna&&!isExternal?`<span class="mchip" style="color:#B48EF8">👤 ${cna}</span>`:''}
        ${(t.tags||[]).filter(tg=>activeTags.has(tg)).map(tg=>`<span class="tag" style="background:var(--bg4);color:var(--ink3);border:1px solid var(--line2)">${tg}</span>`).join('')}
      </div>

}

// ── CALENDAR VIEW ────────────────────────────────────────
function renderCalendar(){
  const src=srcTasks(),days=getWkDays(wkOff),showCust=curC==='all';
  const wkLbl=`${MS[days[0].getMonth()]} ${days[0].getDate()} — ${MS[days[6].getMonth()]} ${days[6].getDate()}, ${days[6].getFullYear()}`;
  let h=`<div class="cal-page">`;h+=buildMetrics(src);if(curC!=='all')h+=buildCsumCard(gc(curC));
  h+=`<div class="cal-nav-row"><div style="display:flex;gap:6px;align-items:center"><span style="font-size:11px;font-weight:600;color:var(--ink3)">View:</span><span class="fc${calMode==='week'?' on':''}" onclick="calMode='week';renderCalendar()">Week</span><span class="fc${calMode==='gantt'?' on':''}" onclick="calMode='gantt';renderCalendar()">Gantt</span></div><div class="wk-nav"><button class="wk-btn" onclick="wkOff--;renderCalendar()"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="7.5,2.5 3.5,6 7.5,9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="wk-lbl">${wkLbl}</div><button class="wk-btn" onclick="wkOff++;renderCalendar()"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="4.5,2.5 8.5,6 4.5,9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div></div>`;
  if(calMode==='gantt')h+=buildGantt(src,days,showCust);else h+=buildWeekCal(src,days,showCust);
  h+=`</div>`;document.getElementById('scroll').innerHTML=h;
}
function buildWeekCal(src,days,showCust){
  let h=`<div class="cal-block"><div class="cal-dow">`;
  days.forEach((d,i)=>{const iT=d.toDateString()===TODAY.toDateString();h+=`<div class="cal-dow-c" style="${iT?'color:var(--blue)':''}">${DAYS[i]}</div>`;});
  h+=`</div><div class="cal-days">`;
  days.forEach(d=>{const iT=d.toDateString()===TODAY.toDateString(),isPast=d<TODAY&&!iT;const cnt=src.filter(t=>t.due===ds(d)).length;h+=`<div class="cal-day"><div class="cal-dn${iT?' today':''}${isPast?' dim':''}">${d.getDate()}</div>${cnt?`<div style="font-size:9px;color:var(--ink3);margin-top:2px;font-weight:500">${cnt}t</div>`:'<div style="height:13px"></div>'}</div>`;});
  h+=`</div><div class="cal-tasks-wrap">`;let any=false;
  days.forEach((d,i)=>{
    const iT=d.toDateString()===TODAY.toDateString(),dstr=ds(d);const dt=src.filter(t=>t.due===dstr);if(!dt.length)return;any=true;
    const dl=Math.ceil((d-TODAY)/864e5),col=dl<0?'var(--red)':iT?'var(--blue)':'var(--ink3)';
    const lbl=iT?'Today':dl<0?`${MS[d.getMonth()]} ${d.getDate()} — overdue`:`${DAYS[i]}, ${MS[d.getMonth()]} ${d.getDate()}`;
    h+=`<div class="cal-day-group"><div class="cal-day-hd"><div class="cal-day-dot" style="background:${col}"></div><div class="cal-day-label" style="color:${col}">${lbl}</div><div class="cal-day-cnt">${dt.length} task${dt.length>1?'s':''}</div><div class="cal-day-line"></div></div>`;
    PRIS.forEach(p=>dt.filter(t=>t.pri===p).forEach(t=>{const c=gc(t.cust),dn=t.status==='completed';const sd=(t.subs||[]).filter(s=>s.done).length;const {dc,dt:dtStr}=dueMeta(t.due);
      h+=`<div class="cal-row${dn?' done':''}" onclick="openTDP(${t.id})">
        <div class="chk${dn?' on':''}" onclick="event.stopPropagation();togDone(${t.id})"></div>
        <div class="tr-body"><div class="tr-name${dn?' done':''}">${t.title}</div>
        <div class="tr-meta">${priTag(t.pri)}${showCust?custTag(c):''}${ownerTag(t.owner)}<span class="mchip" style="color:${dc}">${dtStr}</span>${durationChip(t)}${t.subs&&t.subs.length?`<span class="mchip">${sd}/${t.subs.length} sub-tasks</span>`:''}</div>
        ${!dn&&t.prog>0?`<div class="pgbar"><div class="pgfill" style="width:${t.prog}%"></div></div>`:''}</div>
      </div>`;/* NOTE: .reb Edit button omitted */
    }));
    h+=`</div>`;
  });
  if(!any)h+=`<div class="no-tasks">No tasks due this week.</div>`;
  h+=`</div></div>`;return h;
}
function buildGantt(src,days,showCust){
  const wkStart=days[0],wkEnd=days[6];const ganttTasks=src.filter(t=>{if(!t.due)return false;const due=new Date(t.due);const start=t.durationDays?new Date(due.getTime()-t.durationDays*864e5):new Date(t.created||due);return start<=wkEnd&&due>=wkStart;});
  if(!ganttTasks.length)return`<div class="no-tasks">No tasks span this week.</div>`;
  const wkStartMs=wkStart.getTime(),totalDays=7;const todayOff=Math.max(0,Math.min(totalDays,(TODAY.getTime()-wkStartMs)/864e5));const todayPct=(todayOff/totalDays*100).toFixed(1);
  let h=`<div class="gantt-wrap"><table class="gantt-table"><thead class="gantt-header"><tr><th style="width:200px;min-width:160px">Task</th>${showCust?'<th style="width:90px">Customer</th>':''}<th style="width:40px">Pri</th><th style="width:36px">Prog</th><th style="min-width:280px;position:relative"><div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center">${days.map((d,i)=>{const iT=d.toDateString()===TODAY.toDateString();return`<div style="font-size:10px;font-weight:600;color:${iT?'var(--blue)':'var(--ink3)'}">${DAYS[i].slice(0,1)}<br><span>${d.getDate()}</span></div>`;}).join('')}</div></th></tr></thead><tbody>`;
  PRIS.forEach(p=>ganttTasks.filter(t=>t.pri===p).forEach(t=>{const c=gc(t.cust),dn=t.status==='completed';const due=new Date(t.due);const startDate=t.durationDays?new Date(due.getTime()-t.durationDays*864e5):new Date(t.created||due);const barStart=Math.max(0,(startDate.getTime()-wkStartMs)/864e5);const barEnd=Math.min(totalDays,(due.getTime()-wkStartMs)/864e5+1);const barW=Math.max(0,barEnd-barStart);const leftPct=(barStart/totalDays*100).toFixed(1);const widthPct=(barW/totalDays*100).toFixed(1);const barColor=dn?'#3A4157':PC[t.pri]?.tc||'#4A8EF8';
    h+=`<tr class="gantt-row" onclick="openTDP(${t.id})" style="cursor:pointer"><td><div style="font-size:12px;font-weight:500;color:${dn?'var(--ink3)':'var(--ink)'};${dn?'text-decoration:line-through;':''}white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px">${t.title}</div></td>${showCust?`<td>${c?`<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;background:${c.bg};color:${c.clr}">${c.ini}</span>`:''}</td>`:''}<td>${priTag(t.pri)}</td><td><span style="font-size:11px;color:${dn?'var(--green)':'var(--ink2)'};font-weight:600">${t.prog}%</span></td><td class="gantt-bar-cell"><div class="gantt-bar-wrap"><div class="gantt-today-line" style="left:${todayPct}%"></div><div class="gantt-bar" style="left:${leftPct}%;width:${widthPct}%;background:${barColor};min-width:4px;opacity:${dn?.7:1}" title="${t.title} | ${t.prog}% | Due ${t.due}"><div class="gantt-prog" style="width:${t.prog}%;background:#fff"></div>${parseFloat(widthPct)>8?`<span style="position:relative;z-index:1;font-size:9px;font-weight:600;white-space:nowrap;overflow:hidden">${t.title.slice(0,18)}${t.title.length>18?'…':''}</span>`:''}</div></div></td></tr>`;}));
  h+=`</tbody></table></div>`;return h;
}

function addFilterRule(){const i=filterRuleCount++;const wrap=document.getElementById('filter-rules-wrap');if(!wrap)return;const div=document.createElement('div');div.className='filter-rule-row';div.id=`fr-row-${i}`;div.innerHTML=`<select class="edit-select" style="width:90px" id="fr-f-${i}"><option value="pri">Priority</option><option value="owner">Owner</option><option value="status">Status</option></select><select class="edit-select" style="width:64px" id="fr-op-${i}"><option value="eq">is</option><option value="neq">is not</option></select><select class="edit-select" style="width:110px" id="fr-v-${i}"><option value="P0">P0</option><option value="P1">P1</option><option value="P2">P2</option><option value="Me">Me</option><option value="Internal">Internal</option><option value="Shared">Shared</option><option value="open">open</option><option value="completed">completed</option></select><button class="btn sm danger" onclick="document.getElementById('fr-row-${i}').remove()">×</button>`;wrap.appendChild(div);}
function saveNewFilter(){const name=document.getElementById('s-fname')?.value.trim();if(!name)return;const rules=[];for(let i=0;i<filterRuleCount;i++){const f=document.getElementById(`fr-f-${i}`),op=document.getElementById(`fr-op-${i}`),v=document.getElementById(`fr-v-${i}`);if(f&&op&&v)rules.push({field:f.value,op:op.value,val:v.value});}customFilters.push({id:'f'+Date.now(),name,rules});filterRuleCount=1;toast('Filter saved');renderSettings();}
function toggleTagActive(t){if(activeTags.has(t))activeTags.delete(t);else activeTags.add(t);renderSettings();}
function saveTagEdit(i){const inp=document.getElementById(`edit-tag-${i}`);if(!inp)return;const nv=inp.value.trim();if(nv&&nv!==customTags[i]){if(activeTags.has(customTags[i])){activeTags.delete(customTags[i]);activeTags.add(nv);}customTags[i]=nv;}editingTagIdx=null;renderSettings();}
function addTag(){const v=document.getElementById('s-new-tag')?.value.trim();if(!v||customTags.includes(v))return;customTags.push(v);activeTags.add(v);document.getElementById('s-new-tag').value='';renderSettings();}
function removeTag(t){customTags=customTags.filter(x=>x!==t);activeTags.delete(t);renderSettings();}
function applyCustomFilter(id){const f=customFilters.find(x=>x.id===id);if(!f)return;fPri=[];fOwn=[];fStat='all';setC(curC==='settings'?'all':curC);toast(`Filter "${f.name}" applied`);}

  const linkedH=tc.length?tc.map(ct=>{const cc=gc(ct.cust);return`<div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--line)"><div class="ccard-ava" style="width:27px;height:27px;font-size:9px;${cc?`background:${cc.bg};color:${cc.clr}`:'background:var(--blue-lt);color:var(--blue)'}">${ini(ct.name)}</div><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:var(--ink)">${ct.name}${ct.eb?' <span class="eb-badge">EB</span>':''}</div><div style="font-size:11px;color:var(--ink3)">${ct.designation}</div></div></div>`;}).join(''):`<div style="font-size:12px;color:var(--ink3);padding:5px 0">No contacts linked.</div>`;

  const {dc,dt}=dueMeta(t.due);

  <button class="btn" style="border:none;padding:2px 7px;font-size:15px;color:var(--ink3)" onclick="closeTDP()">✕</button></div>
  <div class="tdp-sc">
    <div class="blk"><div class="blk-lbl">Details</div>
      <div class="dg2">
        <div class="dg-c"><div class="dg-l">Priority</div><div class="dg-v" style="margin-top:4px">${priTag(t.pri)}</div></div>
        <div class="dg-c"><div class="dg-l">Customer</div><div class="dg-v" style="margin-top:4px">${c?custTag(c):'—'}</div></div>
        <div class="dg-c"><div class="dg-l">Owner</div><div class="dg-v" style="margin-top:4px">${ownerTag(t.owner)}</div></div>
        <div class="dg-c"><div class="dg-l">Due date</div><div class="dg-v" style="margin-top:4px;color:${dc}">${dt}</div></div>
        ${t.durationDays?`<div class="dg-c"><div class="dg-l">Duration</div><div class="dg-v" style="margin-top:4px">⏱ ${t.durationDays} days</div></div>`:''}
        <div class="dg-c" style="grid-column:1/-1"><div class="dg-l">Progress</div>
          <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
            <div style="flex:1;height:6px;border-radius:3px;background:var(--line2);overflow:hidden"><div style="height:100%;border-radius:3px;background:var(--blue);width:${t.prog}%"></div></div>

          </div>
        </div>
        ${(t.tags||[]).length?`<div class="dg-c" style="grid-column:1/-1"><div class="dg-l">Tags</div><div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:4px">${(t.tags||[]).filter(tg=>activeTags.has(tg)).map(tg=>`<span class="tag" style="background:var(--bg4);color:var(--ink3);border:1px solid var(--line2)">${tg}</span>`).join('')}</div></div>`:''}
      </div>

    ${t.notes?`<div class="blk"><div class="blk-lbl">Notes</div><div style="background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-md);padding:10px 12px;font-size:12px;color:var(--ink2);line-height:1.65">${t.notes}</div></div>`:''}
    <div class="blk"><div class="blk-lbl">Contacts</div><div style="background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-md);padding:4px 10px">${linkedH}</div></div>
    <div class="blk"><div class="blk-lbl">Activity</div><div style="background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-md);padding:4px 10px">${logsH}</div></div>
    <div style="display:flex;gap:7px;flex-wrap:wrap">
      <button class="btn" style="flex:1;justify-content:center;background:${dn?'var(--bg3)':'var(--green-lt)'};color:${dn?'var(--ink2)':'var(--green)'};border-color:${dn?'var(--line2)':'#1A4A2E'}" onclick="togDone(${t.id})">${dn?'Reopen':'Mark complete'}</button>
      <button class="btn danger" style="flex:1;justify-content:center" onclick="archiveTask(${t.id})">Archive</button>
    </div>

  </div>`;
  document.getElementById('tdp-back').classList.add('o');setTimeout(()=>document.getElementById('tdp').classList.add('o'),10);
}
function closeTDP(){document.getElementById('tdp').classList.remove('o');document.getElementById('tdp-back').classList.remove('o');}
function togDone(id){const t=tasks.find(x=>x.id===id);t.status=t.status==='completed'?'open':'completed';if(t.status==='completed')t.prog=100;addAudit(t.status==='completed'?'Task completed':'Task reopened',`"${t.title}"`,t.cust);toast(t.status==='completed'?'Marked complete':'Task reopened');closeTDP();render();}

function openExternal(custId){extCustId=custId;extView='list';extWkOff=0;document.getElementById('ext-view').classList.add('o');const c=gc(custId);document.getElementById('ext-title').textContent=c?`${c.name} — Customer Portal`:'Customer Portal';document.getElementById('ext-vb-list').classList.add('on');document.getElementById('ext-vb-cal').classList.remove('on');renderExternal();}

function extSrcTasks(){return tasks.filter(t=>!t.archived&&!archivedCusts.has(t.cust)&&t.cust===extCustId&&t.owner==='Shared');}
function renderExternal(){
  const src=extSrcTasks();const open=src.filter(t=>t.status==='open'),done=src.filter(t=>t.status==='completed');let h='';
  if(extView==='list'){h+=`<div style="margin-bottom:16px"><div style="font-size:18px;font-weight:600;color:var(--ink);margin-bottom:4px">Shared tasks</div><div style="font-size:13px;color:var(--ink3)">${open.length} open · ${done.length} completed</div></div>`;if(!src.length){h+=`<div style="text-align:center;padding:48px;color:var(--ink3);font-size:13px">No shared tasks at this time.</div>`;}else{if(open.length){h+=`<div class="sec-hd" style="margin-top:0">Open — ${open.length}</div>`;PRIS.forEach(p=>open.filter(t=>t.pri===p).forEach(t=>{h+=buildTaskRow(t,false,true);}));}if(done.length){h+=`<div class="sec-hd" style="margin-top:14px">Completed — ${done.length}</div>`;done.forEach(t=>{h+=buildTaskRow(t,false,true);});}}}
  else{const days=getWkDays(extWkOff);const wkLbl=`${MS[days[0].getMonth()]} ${days[0].getDate()} — ${MS[days[6].getMonth()]} ${days[6].getDate()}, ${days[6].getFullYear()}`;h+=`<div style="display:flex;justify-content:flex-end;margin-bottom:13px"><div class="wk-nav"><button class="wk-btn" onclick="extWkOff--;renderExternal()"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="7.5,2.5 3.5,6 7.5,9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="wk-lbl">${wkLbl}</div><button class="wk-btn" onclick="extWkOff++;renderExternal()"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="4.5,2.5 8.5,6 4.5,9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div></div>`;h+=buildWeekCal(src,days,false);}
  document.getElementById('ext-body').innerHTML=h;
}
// External TDP — same as main TDP but no archive button
function openExtTDP(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;const dn=t.status==='completed',prog=Math.round(t.prog);
  const {dc,dt}=dueMeta(t.due);
  document.getElementById('ext-body').innerHTML=`<button class="btn sm" style="margin-bottom:14px" onclick="renderExternal()">← Back to tasks</button>
  <div style="background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-xl);padding:16px">
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px">${priTag(t.pri)}<span class="tag" style="background:${dn?'var(--green-lt)':'var(--blue-lt)'};color:${dn?'var(--green)':'var(--blue)'}">${dn?'Completed':'Open'}</span></div>
    <div style="font-size:15px;font-weight:600;color:${dn?'var(--ink3)':'var(--ink)'};${dn?'text-decoration:line-through;':''}margin-bottom:14px">${t.title}</div>
    <div class="dg2" style="margin-bottom:14px">
      <div class="dg-c"><div class="dg-l">Due date</div><div class="dg-v" style="margin-top:4px;color:${dc}">${dt}</div></div>
      <div class="dg-c"><div class="dg-l">Owner</div><div class="dg-v" style="margin-top:4px">${ownerTag(t.owner)}</div></div>
      <div class="dg-c" style="grid-column:1/-1"><div class="dg-l">Progress</div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:4px">
          <div style="flex:1;height:6px;border-radius:3px;background:var(--line2);overflow:hidden"><div style="height:100%;border-radius:3px;background:var(--blue);width:${prog}%"></div></div>
          <span style="font-size:12px;font-weight:600;color:var(--ink2)">${prog}%</span>
        </div>
      </div>
    </div>
    ${t.ctx?`<div style="background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-md);padding:10px 12px;font-size:12px;color:var(--ink2);line-height:1.65;margin-bottom:14px">${t.ctx}</div>`:''}
    ${t.subs&&t.subs.length?`<div style="background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-md);padding:2px 10px;margin-bottom:14px">${t.subs.map(s=>`<div class="sub-row"><div class="schk${s.done?' on':''}"></div><span style="${s.done?'text-decoration:line-through;color:var(--ink3)':'color:var(--ink2)'}">${s.t}</span></div>`).join('')}</div>`:''}
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn" style="flex:1;justify-content:center;background:${dn?'var(--bg3)':'var(--green-lt)'};color:${dn?'var(--ink2)':'var(--green)'};border-color:${dn?'var(--line2)':'#1A4A2E'}" onclick="togDoneExt(${t.id})">${dn?'Reopen':'Mark complete'}</button>
    </div>
  </div>`;
}
function togDoneExt(id){const t=tasks.find(x=>x.id===id);t.status=t.status==='completed'?'open':'completed';if(t.status==='completed')t.prog=100;addAudit(t.status==='completed'?'Task completed (external)':'Task reopened (external)',`"${t.title}"`,t.cust);toast(t.status==='completed'?'Marked complete':'Task reopened');renderExternal();render();}

// ── BACKUP / RESTORE / UPLOAD ────────────────────────────
function dlBackup(){lastBackup=new Date();const data={version:1,exported:lastBackup.toISOString(),customers:custs,contacts,archivedCustomers:[...archivedCusts],tasks,auditLog,customTags,customFilters};const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));a.download=`cs-backup-${ds(new Date())}.json`;a.click();addAudit('Backup downloaded','Full database export','');toast('Backup downloaded');renderSB();}
function restoreBackup(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.customers)custs=d.customers.map(normC);if(d.tasks)tasks=d.tasks;if(d.contacts)contacts=d.contacts;archivedCusts=new Set(d.archivedCustomers||d.archived_customers||[]);if(d.auditLog)auditLog=d.auditLog;if(d.customTags)customTags=d.customTags;if(d.customFilters)customFilters=d.customFilters;lastBackup=d.exported?new Date(d.exported):null;curC='all';fPri=[];fOwn=[];fStat='open';sbSegF=[];addAudit('Backup restored','Database restored from file','');toast('Backup restored');render();}catch{toast('Error reading backup file');}};r.readAsText(file);e.target.value='';}
function uploadCustomers(e){const file=e.target.files[0];if(!file)return;const r=new FileReader();r.onload=ev=>{try{let arr=[];if(file.name.endsWith('.json')){const d=JSON.parse(ev.target.result);arr=Array.isArray(d)?d:d.customers||[];}else{const lines=ev.target.result.trim().split('\n'),hdrs=lines[0].split(',').map(h=>h.trim());arr=lines.slice(1).map(row=>{const o={};row.split(',').forEach((v,i)=>{o[hdrs[i]]=v.trim();});if(o.health)o.health=parseInt(o.health)||80;return o;});}if(!arr.length){toast('No customers found');return;}let added=0,updated=0;arr.forEach(nc=>{const ex=custs.find(c=>c.id===nc.id);ex?(Object.assign(ex,normC({...ex,...nc})),updated++):(custs.push(normC(nc)),added++);});addAudit('Customers uploaded',`${added} added, ${updated} updated`,'');toast(`${added} added / ${updated} updated`);render();}catch{toast('Error reading file');}};r.readAsText(file);e.target.value='';}

// ── ROUTING ──────────────────────────────────────────────
function setC(id){curC=id;render();}
function setView(v){curView=v;document.getElementById('vb-list').classList.toggle('on',v==='list');document.getElementById('vb-cal').classList.toggle('on',v==='cal');render();}
function setFS(s){fStat=s;render();}
function togFPri(p){const i=fPri.indexOf(p);i>=0?fPri.splice(i,1):fPri.push(p);render();}
function togFOwn(o){const i=fOwn.indexOf(o);i>=0?fOwn.splice(i,1):fOwn.push(o);render();}
function togSbSeg(id){const i=sbSegF.indexOf(id);i>=0?sbSegF.splice(i,1):sbSegF.push(id);if(curC!=='all'&&!['archive','audit','settings'].includes(curC)){const vc=visCusts();if(!vc.find(c=>c.id===curC))curC='all';}render();}

function render(){
  renderSB();
  if(curC==='archive'){renderArchive();return;}
  if(curC==='audit'){renderAuditLog();return;}
  if(curC==='settings'){renderSettings();return;}
  curView==='list'?renderList():renderCalendar();
}
render();
</script>
