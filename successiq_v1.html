
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0F1117;--bg2:#181C25;--bg3:#1E2330;--bg4:#242938;
  --line:#2C3347;--line2:#3A4157;
  --ink:#E8EBF4;--ink2:#A8B2CC;--ink3:#6B7A99;
  --blue:#4A8EF8;--blue-dk:#2F6FE8;--blue-lt:#1A2A4A;
  --green:#3DB87A;--green-lt:#142A1E;
  --red:#F06B6B;--red-lt:#2A1414;
  --amber:#F0A030;--amber-lt:#2A1E08;
  --r-md:8px;--r-lg:12px;--r-xl:16px;
  --font:'DM Sans',sans-serif
}
body{font-family:var(--font);background:var(--bg);color:var(--ink)}
.app{display:flex;height:100vh;min-height:680px;position:relative}
.sidebar{width:232px;background:var(--bg2);border-right:1px solid var(--line);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-brand{padding:15px 16px 12px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--line)}
.logo-wrap{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,#4A8EF8 0%,#7B5EF8 100%);display:flex;align-items:center;justify-content:center;flex-shrink:0;box-shadow:0 2px 8px rgba(74,142,248,.35)}
.seg-strip{padding:8px 14px 7px;border-bottom:1px solid var(--line)}
.seg-strip-lbl{font-size:10px;font-weight:600;color:var(--ink3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px}
.seg-pills{display:flex;gap:4px;flex-wrap:wrap}
.seg-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 8px 3px 6px;border-radius:20px;border:1.5px solid transparent;cursor:pointer;font-size:11px;font-weight:600;font-family:var(--font);transition:all .13s;user-select:none}
.seg-pill .sp-b{font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px}
.seg-pill.on{box-shadow:0 0 0 2px currentColor}
.sb-s{padding:6px 0 3px}
.sb-lbl{font-size:10px;font-weight:600;color:var(--ink3);padding:2px 16px 4px;letter-spacing:.08em;text-transform:uppercase}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 14px 7px 16px;cursor:pointer;font-size:13px;color:var(--ink2);border-left:2.5px solid transparent;transition:all .12s;font-weight:400}
.nav-item:hover{background:var(--blue-lt);color:var(--blue)}
.nav-item.on{color:var(--blue);border-left-color:var(--blue);background:var(--blue-lt);font-weight:500}
.c-ava{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:700;flex-shrink:0}
.sb-foot{margin-top:auto;padding:11px;border-top:1px solid var(--line);display:flex;flex-direction:column;gap:5px}
.backup-ts{font-size:10px;color:var(--ink3);text-align:center;padding:0 2px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}
.topbar{background:var(--bg2);border-bottom:1px solid var(--line);padding:0 22px;display:flex;align-items:center;gap:10px;height:50px;flex-shrink:0}
.tb-title{font-size:15px;font-weight:600;color:var(--ink);flex:1}
.vtog{display:flex;border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden}
.vtog-btn{font-size:12px;padding:5px 12px;border:none;background:var(--bg2);color:var(--ink2);cursor:pointer;font-family:var(--font);font-weight:500;transition:all .12s;display:flex;align-items:center;gap:5px}
.vtog-btn:hover{background:var(--blue-lt);color:var(--blue)}
.vtog-btn.on{background:var(--blue);color:#fff}
.scroll{flex:1;overflow-y:auto;background:var(--bg)}
.pad{padding:18px 22px}
.btn{font-size:12px;padding:6px 11px;border-radius:var(--r-md);border:1px solid var(--line2);background:var(--bg3);color:var(--ink2);cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .12s;white-space:nowrap;font-family:var(--font);font-weight:500}
.btn:hover{background:var(--blue-lt);border-color:var(--blue);color:var(--blue)}
.btn.sm{font-size:11px;padding:4px 9px}
.btn.ext-btn{background:var(--green-lt);color:var(--green);border-color:#1A4A2E;font-weight:600}
.btn.ext-btn:hover{background:var(--green);color:#fff}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:18px}
.metric{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-lg);padding:13px 15px}
.m-lbl{font-size:11px;color:var(--ink3);margin-bottom:8px;font-weight:500}
.m-row{display:flex;align-items:baseline;gap:5px}
.m-open{font-size:22px;font-weight:700;color:var(--red);line-height:1}
.m-tot{font-size:14px;font-weight:500;color:var(--blue)}
.m-sep{font-size:14px;color:var(--line2)}
.m-single{font-size:22px;font-weight:700}
.m-sub{font-size:10px;color:var(--ink3);margin-top:4px}
.csum-card{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-xl);margin-bottom:14px;overflow:hidden}
.csum-hd{display:flex;align-items:center;gap:11px;padding:12px 15px;cursor:pointer;transition:background .12s;user-select:none}
.csum-hd:hover{background:var(--blue-lt)}
.csum-ava{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.chev{width:15px;height:15px;flex-shrink:0;transition:transform .2s;color:var(--ink3)}
.chev.o{transform:rotate(180deg)}
.csum-body{border-top:1px solid var(--line);padding:13px 15px;background:var(--bg3);display:none}
.csum-body.o{display:block}
.csum-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:9px}
.cf-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:2px;font-weight:600}
.cf-val{font-size:12px;color:var(--ink2)}
.hbar{height:4px;border-radius:2px;background:var(--line2);overflow:hidden}
.hfill{height:100%;border-radius:2px}
.ctab-bar{display:flex;border-bottom:1px solid var(--line);margin-top:13px;margin-bottom:12px;overflow-x:auto}
.ctab{font-size:12px;font-weight:500;padding:7px 13px;cursor:pointer;color:var(--ink3);border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap}
.ctab:hover{color:var(--ink)}
.ctab.on{color:var(--blue);border-bottom-color:var(--blue);font-weight:600}
.ccard{background:var(--bg4);border:1px solid var(--line);border-radius:var(--r-lg);padding:10px 12px;margin-bottom:5px;display:flex;align-items:flex-start;gap:9px}
.ccard-ava{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.eb-badge{font-size:9px;font-weight:700;padding:1px 6px;border-radius:3px;background:#2D1A4A;color:#B48EF8;letter-spacing:.04em}
.fbar{display:flex;align-items:center;gap:5px;margin-bottom:7px;flex-wrap:wrap}
.fc{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--line2);cursor:pointer;color:var(--ink2);background:var(--bg3);transition:all .12s;font-family:var(--font);font-weight:500}
.fc:hover{border-color:var(--blue);color:var(--blue)}
.fc.on{background:var(--blue-lt);border-color:var(--blue);color:var(--blue);font-weight:600}
.fc.tag-fc{cursor:pointer}
.fc.tag-fc.on{background:var(--purple-lt,#2A1A4A);border-color:#9B6BF8;color:#B48EF8}
.sort-bar{display:flex;align-items:center;gap:5px;margin-bottom:13px;flex-wrap:wrap}
.sort-btn{font-size:11px;padding:3px 9px;border-radius:20px;border:1px solid var(--line2);cursor:pointer;color:var(--ink2);background:var(--bg3);transition:all .12s;font-family:var(--font);font-weight:500;display:inline-flex;align-items:center;gap:4px}
.sort-btn:hover{border-color:var(--blue);color:var(--blue)}
.sort-btn.on{background:var(--blue-lt);border-color:var(--blue);color:var(--blue);font-weight:600}
.sec-hd{font-size:11px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.07em;margin:13px 0 7px}
.task-row{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-lg);margin-bottom:5px;display:flex;align-items:flex-start;gap:9px;padding:10px 13px;cursor:pointer;transition:all .12s}
.task-row:hover{border-color:var(--blue);background:var(--blue-lt)}
.task-row.done{opacity:.45}
.tr-body{flex:1;min-width:0}
.tr-name{font-size:13px;font-weight:500;color:var(--ink);line-height:1.35}
.tr-name.done{text-decoration:line-through;color:var(--ink3)}
.tr-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-top:4px}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;flex-shrink:0;letter-spacing:.02em}
.tag.clickable{cursor:pointer;transition:opacity .12s}
.tag.clickable:hover{opacity:.75}
.odot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.mchip{font-size:11px;color:var(--ink3);display:flex;align-items:center;gap:3px}
.pgbar{height:3px;border-radius:2px;background:var(--line2);margin-top:5px;width:90px;overflow:hidden}
.pgfill{height:100%;border-radius:2px;background:var(--blue)}
.cal-page{padding:18px 22px}
.cal-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px;gap:8px}
.wk-nav{display:flex;align-items:center;gap:5px;background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-lg);padding:4px 7px 4px 11px}
.wk-lbl{font-size:12px;font-weight:600;color:var(--ink);min-width:148px;text-align:center}
.wk-btn{width:26px;height:26px;border-radius:var(--r-md);border:none;background:transparent;cursor:pointer;color:var(--ink3);display:flex;align-items:center;justify-content:center;transition:all .12s}
.wk-btn:hover{background:var(--blue-lt);color:var(--blue)}
.cal-block{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-xl);overflow:hidden}
.cal-dow{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));background:var(--bg3);border-bottom:1px solid var(--line)}
.cal-dow-c{font-size:11px;font-weight:600;color:var(--ink3);text-align:center;padding:8px 4px;letter-spacing:.04em}
.cal-days{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));border-bottom:1px solid var(--line)}
.cal-day{border-right:1px solid var(--line);padding:7px 0 9px;text-align:center}
.cal-day:last-child{border-right:none}
.cal-dn{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--ink3);margin:0 auto}
.cal-dn.today{background:var(--blue);color:#fff;font-weight:700}
.cal-dn.dim{color:var(--line2)}
.cal-tasks-wrap{padding:13px 0 0}
.cal-day-group{padding:0 0 13px}
.cal-day-hd{display:flex;align-items:center;gap:9px;padding:0 13px;margin-bottom:5px}
.cal-day-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.cal-day-label{font-size:12px;font-weight:700}
.cal-day-cnt{font-size:11px;color:var(--ink3)}
.cal-day-line{flex:1;height:1px;background:var(--line)}
.cal-row{background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-lg);margin:0 13px 4px;display:flex;align-items:flex-start;gap:8px;padding:8px 11px;cursor:pointer;transition:all .12s}
.cal-row:hover{border-color:var(--blue);background:var(--blue-lt)}
.cal-row.done{opacity:.45}
.no-tasks{text-align:center;padding:28px;color:var(--ink3);font-size:13px}
.gantt-wrap{overflow-x:auto;margin-top:4px}
.gantt-table{border-collapse:collapse;width:100%;min-width:600px}
.gantt-header{background:var(--bg3)}
.gantt-header th{font-size:10px;font-weight:600;color:var(--ink3);padding:6px 8px;border:1px solid var(--line);text-align:left;white-space:nowrap}
.gantt-row td{border:1px solid var(--line);padding:5px 8px;font-size:11px;vertical-align:middle}
.gantt-row:hover{background:var(--blue-lt)}
.gantt-bar-cell{padding:4px 3px!important}
.gantt-bar-wrap{position:relative;height:18px}
.gantt-bar{height:18px;border-radius:4px;position:absolute;top:0;display:flex;align-items:center;padding:0 5px;font-size:9px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;cursor:pointer}
.gantt-prog{position:absolute;left:0;top:0;height:100%;border-radius:4px;opacity:.35}
.gantt-today-line{position:absolute;top:0;bottom:0;width:2px;background:var(--blue);opacity:.7;pointer-events:none;z-index:2}
.tdp-back{display:none;position:absolute;inset:0;background:rgba(0,0,0,.55);z-index:60}
.tdp-back.o{display:block}
.tdp{position:absolute;right:0;top:0;bottom:0;width:455px;max-width:95%;background:var(--bg2);border-left:1px solid var(--line);display:flex;flex-direction:column;transform:translateX(100%);transition:transform .27s cubic-bezier(.4,0,.2,1);z-index:61}
.tdp.o{transform:translateX(0)}
.tdp-hd{padding:13px 15px 11px;border-bottom:1px solid var(--line);display:flex;align-items:flex-start;gap:10px;flex-shrink:0}
.tdp-sc{flex:1;overflow-y:auto;padding:15px}
.blk{margin-bottom:15px}
.blk-lbl{font-size:10px;font-weight:700;color:var(--ink3);text-transform:uppercase;letter-spacing:.09em;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.blk-lbl::after{content:'';flex:1;height:1px;background:var(--line)}
.dg2{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.dg-c{background:var(--bg3);border-radius:var(--r-md);padding:8px 10px}
.dg-l{font-size:10px;text-transform:uppercase;letter-spacing:.07em;color:var(--ink3);margin-bottom:3px;font-weight:700}
.dg-v{font-size:12px;color:var(--ink2);display:flex;align-items:center;gap:5px}
.sub-row{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--ink2);padding:4px 0;border-bottom:1px solid var(--line)}
.sub-row:last-child{border-bottom:none}
.schk{width:13px;height:13px;border-radius:3px;border:1.5px solid var(--line2);flex-shrink:0;display:flex;align-items:center;justify-content:center}
.schk.on{background:var(--green);border-color:var(--green)}
.schk.on::after{content:'';width:5px;height:3px;border-left:1.5px solid #fff;border-bottom:1.5px solid #fff;transform:rotate(-45deg) translateY(-1px);display:block}
.fi,.edit-input,.edit-select{width:100%;padding:7px 9px;font-size:12px;border-radius:var(--r-md);border:1px solid var(--line2);background:var(--bg3);color:var(--ink);font-family:var(--font)}
.edit-input,.edit-select,.fi{height:32px}
select option{background:var(--bg3);color:var(--ink)}
.audit-entry{display:flex;gap:10px;padding:7px 0;border-bottom:1px solid var(--line)}
.audit-entry:last-child{border-bottom:none}
.audit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.audit-time{font-size:10px;color:var(--ink3);white-space:nowrap}
.audit-actor{font-size:11px;font-weight:600;color:var(--blue)}
.audit-desc{font-size:11px;color:var(--ink2);margin-top:1px}
.audit-panel{border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;margin-top:10px}
.audit-panel-hd{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;cursor:pointer;background:var(--bg4);user-select:none}
.audit-panel-hd:hover{background:var(--bg3)}
.audit-panel-body{display:none;padding:4px 12px 8px;background:var(--bg3)}
.audit-panel-body.o{display:block}
.ext-overlay{position:absolute;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column}
.ext-overlay.o{display:flex}
.ext-top{background:var(--bg2);border-bottom:1px solid var(--line);padding:0 22px;height:50px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.ext-vtog{display:flex;border:1px solid var(--line);border-radius:var(--r-md);overflow:hidden}
.ext-vtog-btn{font-size:12px;padding:5px 12px;border:none;background:var(--bg2);color:var(--ink2);cursor:pointer;font-family:var(--font);font-weight:500;transition:all .12s;display:flex;align-items:center;gap:5px}
.ext-vtog-btn:hover{background:var(--blue-lt);color:var(--blue)}
.ext-vtog-btn.on{background:var(--blue);color:#fff}
.ext-badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:4px;background:var(--green-lt);color:var(--green);letter-spacing:.04em}
.toast{position:absolute;bottom:16px;right:16px;background:var(--bg4);color:var(--ink);border:1px solid var(--line2);border-radius:var(--r-lg);padding:8px 14px;font-size:12px;font-weight:500;z-index:300;transform:translateY(50px);transition:transform .22s;pointer-events:none}
.toast.o{transform:translateY(0)}
</style>

  {id:104,name:'Elena Mores',cust:'ridge',designation:'CFO',           country:'Germany',email:'elena@ridge.de', eb:false,lastContacted:'2026-03-31',notes:'Migration sign-off.'},
];

// ── TWO SEPARATE LOGS ──────────────────
// projectLog: all high-level events (backups, customer changes, etc.)
// taskLog: { [taskId]: [{ts,actor,action,details}] } — per-task activity
let projectLog=[];
let taskLog={};  // keyed by task id

function addProjectLog(action,details,custId=''){
  projectLog.unshift({id:projectLog.length+1,ts:tsNow(),actor:ACTOR,action,details,custId});
  if(projectLog.length>300)projectLog.pop();
}
function addTaskLog(taskId,action,details){
  if(!taskLog[taskId])taskLog[taskId]=[];
  taskLog[taskId].unshift({ts:tsNow(),actor:ACTOR,action,details});
  if(taskLog[taskId].length>50)taskLog[taskId].pop();
}

// ── TAGS ──────────────────────────────
let customTags=['Renewal','Churn risk','Upsell','Issues','Quick win'];
let activeTags=new Set(customTags);

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
let curC='all',curView='list',wkOff=0,sbSegF=[],fPri=[],fOwn=[],fStat='open';
let fTag=null; // active tag filter (single tag string or null)
let sortField='pri',sortDir=1; // pri=default, 'created','due'; dir 1=asc -1=desc
let sumOpen={},custTab={},lastBackup=null;
let calMode='week',extView='list',extCustId=null,extWkOff=0;

// ═══════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════
const gc=id=>custs.find(c=>c.id===id);
const segCfg=id=>SEGS_CFG.find(s=>s.id===id)||SEGS_CFG[0];
const ds=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
const tsNow=()=>new Date().toISOString();
const fmtTS=ts=>{const d=new Date(ts);return`${d.getDate()} ${MS[d.getMonth()]} ${d.getFullYear()}, ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;};
const ini=n=>n.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
function dueMeta(s){if(!s)return{dc:'var(--ink3)',dt:'—'};const d=new Date(s),dl=Math.ceil((d-TODAY)/864e5);return{dc:dl<0?'var(--red)':dl===0?'var(--amber)':'var(--ink3)',dt:dl<0?`${Math.abs(dl)}d overdue`:dl===0?'Due today':s};}
function getWkDays(off){const b=new Date(TODAY);b.setDate(b.getDate()+off*7);const dow=b.getDay()||7;const mon=new Date(b);mon.setDate(b.getDate()-(dow-1));return Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});}
function isOverdue(t){return t.status!=='completed'&&t.due&&new Date(t.due)<TODAY;}
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.classList.add('o');setTimeout(()=>el.classList.remove('o'),2700);}
function fmtDT(d){return`${d.getDate()} ${MS[d.getMonth()]} ${d.getFullYear()}, ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;}

function visCusts(){let cs=custs.filter(c=>true);if(sbSegF.length)cs=cs.filter(c=>sbSegF.includes(c.seg));return cs;}
function srcTasks(){
  const cid=curC;
  return tasks.filter(t=>{
    if(cid==='all'){if(sbSegF.length){const c=gc(t.cust);return c&&sbSegF.includes(c.seg);}return true;}
    return t.cust===cid;
  });
}
function filteredTasks(){
  let t=srcTasks();
  if(fPri.length)t=t.filter(x=>fPri.includes(x.pri));
  if(fOwn.length)t=t.filter(x=>fOwn.includes(x.owner));
  if(fStat!=='all')t=t.filter(x=>x.status===fStat);
  if(fTag)t=t.filter(x=>(x.tags||[]).includes(fTag));
  return t;
}
function sortedTasks(arr){
  return [...arr].sort((a,b)=>{
    if(sortField==='created')return sortDir*(new Date(a.created)-new Date(b.created));
    if(sortField==='due'){
      if(!a.due&&!b.due)return 0;if(!a.due)return 1;if(!b.due)return -1;
      return sortDir*(new Date(a.due)-new Date(b.due));
    }
    // default: priority order
    return PRIS.indexOf(a.pri)-PRIS.indexOf(b.pri);
  });
}

// ═══════════════════════════════════════
// HTML BUILDERS
// ═══════════════════════════════════════
function priTag(p){const c=PC[p]||PC.P5;return`<span class="tag" style="background:${c.bg};color:${c.tc}">${p}</span>`;}
function custTag(c){return c?`<span class="tag" style="background:${c.bg};color:${c.clr}">${c.name}</span>`:'';}
function ownerTag(o){const col=OC[o]||'#888';return`<span class="mchip"><span class="odot" style="background:${col}"></span>${o}</span>`;}
function durationChip(t){if(!t.durationDays)return'';return`<span class="mchip">⏱ ${t.durationDays}d</span>`;}

// tag chips on task rows — clicking filters by that tag
function taskTagChips(tags){
  return (tags||[]).filter(tg=>activeTags.has(tg)).map(tg=>`<span class="tag clickable" style="background:var(--bg4);color:#B48EF8;border:1px solid #4A2A7A" onclick="event.stopPropagation();setTagFilter('${tg}')">${tg}</span>`).join('');
}

function buildMetrics(src){
  const tot=src.length,op=src.filter(t=>t.status==='open').length;
  const p0t=src.filter(t=>t.pri==='P0').length,p0o=src.filter(t=>t.pri==='P0'&&t.status==='open').length;
  const met=src.filter(t=>t.owner==='Me').length,meo=src.filter(t=>t.owner==='Me'&&t.status==='open').length;
  const od=src.filter(t=>isOverdue(t)).length;
  const card=(l,o,t,s)=>`<div class="metric"><div class="m-lbl">${l}</div><div class="m-row"><span class="m-open">${o}</span><span class="m-sep">/</span><span class="m-tot">${t}</span></div><div class="m-sub">${s}</div></div>`;
  return`<div class="metrics">${card('Tasks',op,tot,'<span style="color:var(--red)">open</span> / <span style="color:var(--blue)">total</span>')}${card('P0 Tasks',p0o,p0t,'<span style="color:var(--red)">open</span> / <span style="color:var(--blue)">total</span>')}${card('Assigned to me',meo,met,'<span style="color:var(--red)">open</span> / <span style="color:var(--blue)">total</span>')}<div class="metric"><div class="m-lbl">Overdue</div><div class="m-row"><span class="m-single" style="color:${od>0?'var(--red)':'var(--ink3)'}">${od}</span></div><div class="m-sub">open tasks past due</div></div></div>`;
}

function buildFilterAndSortBar(){
  // status / priority / owner filters
  const sf=['open','completed','all'].map(s=>`<span class="fc${fStat===s?' on':''}" onclick="setFS('${s}')">${s[0].toUpperCase()+s.slice(1)}</span>`).join('');
  const pf=PRIS.map(p=>`<span class="fc${fPri.includes(p)?' on':''}" onclick="togFPri('${p}')">${p}</span>`).join('');
  const of_=OWNERS.map(o=>`<span class="fc${fOwn.includes(o)?' on':''}" onclick="togFOwn(\`${o}\`)">${o}</span>`).join('');
  // tag filter chips
  const activeTlist=[...customTags].filter(t=>activeTags.has(t));
  const tf=activeTlist.map(t=>`<span class="fc tag-fc${fTag===t?' on':''}" onclick="setTagFilter('${t}')">${t}</span>`).join('');
  const clearTag=fTag?`<span class="fc on" style="background:var(--red-lt);border-color:var(--red);color:var(--red)" onclick="setTagFilter(null)">✕ ${fTag}</span>`:'';
  // sort buttons
  const sortArrow=(f)=>{if(sortField!==f)return'↕';return sortDir===1?'↑':'↓';};
  const sortBtns=`<span style="font-size:11px;color:var(--ink3);font-weight:600">Sort:</span>
    <span class="sort-btn${sortField==='created'?' on':''}" onclick="setSort('created')">Created ${sortArrow('created')}</span>
    <span class="sort-btn${sortField==='due'?' on':''}" onclick="setSort('due')">Due ${sortArrow('due')}</span>
    ${sortField!=='pri'?`<span class="sort-btn" onclick="setSort('pri')" style="color:var(--ink3)">Reset</span>`:''}`;

  return`<div class="fbar">${sf}<span style="width:1px;height:14px;background:var(--line2);flex-shrink:0"></span>${pf}<span style="width:1px;height:14px;background:var(--line2);flex-shrink:0"></span>${of_}</div>
  <div class="fbar" style="margin-bottom:5px">${tf}${clearTag}</div>
  <div class="sort-bar">${sortBtns}</div>`;
}

function buildTaskRow(t,showCust=true,isExternal=false){
  const c=gc(t.cust),dn=t.status==='completed';
  const {dc,dt}=dueMeta(t.due);
  const sd=(t.subs||[]).filter(s=>s.done).length;
  const cna=(t.contactIds||[]).length;
  const clickFn=isExternal?`openExtTDP(${t.id})`:`openTDP(${t.id})`;
  return`<div class="task-row${dn?' done':''}" onclick="${clickFn}">
    <div class="tr-body">
      <div class="tr-name${dn?' done':''}">${t.title}</div>
      <div class="tr-meta">
        ${priTag(t.pri)}${showCust&&!isExternal?custTag(c):''}
        ${ownerTag(t.owner)}
        <span class="mchip" style="color:${dc}">${dt}</span>
        <span class="mchip" style="color:var(--ink3)">Created ${t.created}</span>
        ${durationChip(t)}
        ${t.subs&&t.subs.length?`<span class="mchip">${sd}/${t.subs.length} sub-tasks</span>`:''}
        ${cna&&!isExternal?`<span class="mchip" style="color:#B48EF8">👤 ${cna}</span>`:''}
        ${taskTagChips(t.tags)}
      </div>
      ${t.prog>0?`<div class="pgbar"><div class="pgfill" style="width:${t.prog}%"></div></div>`:''}
    </div>
  </div>`;
}

function renderSB(){
  const isSingleCust=curC!=='all'&&curC!=='audit';
  document.getElementById('seg-strip-wrap').style.display=isSingleCust?'none':'';

  document.getElementById('tb-title').textContent=titles[curC]||(gc(curC)?.name||'');
  document.getElementById('view-tog').style.display=curC==='audit'?'none':'';
  const bts=document.getElementById('backup-ts');if(lastBackup){bts.style.display='';bts.textContent='Last backup: '+fmtDT(lastBackup);}else bts.style.display='none';
  const wrap=document.getElementById('sb-cust-list');
  if(curC==='audit'){wrap.innerHTML='';return;}
  if(isSingleCust){
    const c=gc(curC);let h=`<div style="padding:6px 14px 3px"><button class="btn sm" style="width:100%;justify-content:center" onclick="setC('all')">← All customers</button></div>`;
    if(c){const sg=segCfg(c.seg);h+=`<div style="padding:5px 0 3px"><div style="font-size:10px;font-weight:600;color:${sg.color};padding:2px 16px 3px;text-transform:uppercase;letter-spacing:.08em">${sg.label}</div><div class="nav-item on"><div class="c-ava" style="background:${c.bg};color:${c.clr}">${c.ini}</div><span style="color:var(--blue);font-weight:600">${c.name}</span></div></div>`;}
    wrap.innerHTML=h;return;

}

// ── CALENDAR VIEW ────────────────────────────────────────
function renderCalendar(){
  const src=srcTasks(),days=getWkDays(wkOff),showCust=curC==='all';
  const wkLbl=`${MS[days[0].getMonth()]} ${days[0].getDate()} — ${MS[days[6].getMonth()]} ${days[6].getDate()}, ${days[6].getFullYear()}`;

function buildWeekCal(src,days,showCust){
  let h=`<div class="cal-block"><div class="cal-dow">`;
  days.forEach((d,i)=>{const iT=d.toDateString()===TODAY.toDateString();h+=`<div class="cal-dow-c" style="${iT?'color:var(--blue)':''}">${DAYS[i]}</div>`;});
  h+=`</div><div class="cal-days">`;
  days.forEach(d=>{const iT=d.toDateString()===TODAY.toDateString(),isPast=d<TODAY&&!iT;const cnt=src.filter(t=>t.due===ds(d)).length;h+=`<div class="cal-day"><div class="cal-dn${iT?' today':''}${isPast?' dim':''}">${d.getDate()}</div>${cnt?`<div style="font-size:9px;color:var(--ink3);margin-top:2px;font-weight:500">${cnt}t</div>`:'<div style="height:13px"></div>'}</div>`;});
  h+=`</div><div class="cal-tasks-wrap">`;let any=false;
  days.forEach((d,i)=>{
    const iT=d.toDateString()===TODAY.toDateString(),dstr=ds(d);const dt=src.filter(t=>t.due===dstr);if(!dt.length)return;any=true;
    const dl=Math.ceil((d-TODAY)/864e5),col=dl<0?'var(--red)':iT?'var(--blue)':'var(--ink3)';
    const lbl=iT?'Today':dl<0?`${MS[d.getMonth()]} ${d.getDate()} — overdue`:`${DAYS[i]}, ${MS[d.getMonth()]} ${d.getDate()}`;
    h+=`<div class="cal-day-group"><div class="cal-day-hd"><div class="cal-day-dot" style="background:${col}"></div><div class="cal-day-label" style="color:${col}">${lbl}</div><div class="cal-day-cnt">${dt.length} task${dt.length>1?'s':''}</div><div class="cal-day-line"></div></div>`;
    PRIS.forEach(p=>dt.filter(t=>t.pri===p).forEach(t=>{const c=gc(t.cust),dn=t.status==='completed';const sd=(t.subs||[]).filter(s=>s.done).length;const {dc,dt:dtStr}=dueMeta(t.due);
      h+=`<div class="cal-row${dn?' done':''}" onclick="openTDP(${t.id})"><div class="tr-body"><div class="tr-name${dn?' done':''}">${t.title}</div><div class="tr-meta">${priTag(t.pri)}${showCust?custTag(c):''}${ownerTag(t.owner)}<span class="mchip" style="color:${dc}">${dtStr}</span>${durationChip(t)}${t.subs&&t.subs.length?`<span class="mchip">${sd}/${t.subs.length} sub-tasks</span>`:''}</div>${t.prog>0?`<div class="pgbar"><div class="pgfill" style="width:${t.prog}%"></div></div>`:''}</div></div>`;
    }));
    h+=`</div>`;
  });
  if(!any)h+=`<div class="no-tasks">No tasks due this week.</div>`;
  h+=`</div></div>`;return h;
}

function buildGantt(src,days,showCust){
  const wkStart=days[0],wkEnd=days[6];const ganttTasks=src.filter(t=>{if(!t.due)return false;const due=new Date(t.due);const start=t.durationDays?new Date(due.getTime()-t.durationDays*864e5):new Date(t.created||due);return start<=wkEnd&&due>=wkStart;});
  if(!ganttTasks.length)return`<div class="no-tasks">No tasks span this week.</div>`;
  const wkStartMs=wkStart.getTime(),totalDays=7;const todayOff=Math.max(0,Math.min(totalDays,(TODAY.getTime()-wkStartMs)/864e5));const todayPct=(todayOff/totalDays*100).toFixed(1);
  let h=`<div class="gantt-wrap"><table class="gantt-table"><thead class="gantt-header"><tr><th style="width:200px;min-width:160px">Task</th>${showCust?'<th style="width:90px">Customer</th>':''}<th style="width:40px">Pri</th><th style="width:36px">Prog</th><th style="min-width:280px;position:relative"><div style="display:grid;grid-template-columns:repeat(7,1fr);text-align:center">${days.map((d,i)=>{const iT=d.toDateString()===TODAY.toDateString();return`<div style="font-size:10px;font-weight:600;color:${iT?'var(--blue)':'var(--ink3)'}">${DAYS[i].slice(0,1)}<br><span>${d.getDate()}</span></div>`;}).join('')}</div></th></tr></thead><tbody>`;
  PRIS.forEach(p=>ganttTasks.filter(t=>t.pri===p).forEach(t=>{const c=gc(t.cust),dn=t.status==='completed';const due=new Date(t.due);const startDate=t.durationDays?new Date(due.getTime()-t.durationDays*864e5):new Date(t.created||due);const barStart=Math.max(0,(startDate.getTime()-wkStartMs)/864e5);const barEnd=Math.min(totalDays,(due.getTime()-wkStartMs)/864e5+1);const barW=Math.max(0,barEnd-barStart);const leftPct=(barStart/totalDays*100).toFixed(1);const widthPct=(barW/totalDays*100).toFixed(1);const barColor=dn?'#3A4157':PC[t.pri]?.tc||'#4A8EF8';
    h+=`<tr class="gantt-row" onclick="openTDP(${t.id})" style="cursor:pointer"><td><div style="font-size:12px;font-weight:500;color:${dn?'var(--ink3)':'var(--ink)'};${dn?'text-decoration:line-through;':''}white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px">${t.title}</div></td>${showCust?`<td>${c?`<span style="font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;background:${c.bg};color:${c.clr}">${c.ini}</span>`:''}</td>`:''}<td>${priTag(t.pri)}</td><td><span style="font-size:11px;color:${dn?'var(--green)':'var(--ink2)'};font-weight:600">${t.prog}%</span></td><td class="gantt-bar-cell"><div class="gantt-bar-wrap"><div class="gantt-today-line" style="left:${todayPct}%"></div><div class="gantt-bar" style="left:${leftPct}%;width:${widthPct}%;background:${barColor};min-width:4px" title="${t.title}"><div class="gantt-prog" style="width:${t.prog}%;background:#fff"></div>${parseFloat(widthPct)>8?`<span style="position:relative;z-index:1;font-size:9px;font-weight:600">${t.title.slice(0,18)}${t.title.length>18?'…':''}</span>`:''}</div></div></td></tr>`;
  }));
  h+=`</tbody></table></div>`;return h;
}

    ${t.subs&&t.subs.length?`<div class="blk"><div class="blk-lbl">Sub-activities</div><div style="background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-md);padding:2px 10px">${t.subs.map(s=>`<div class="sub-row"><div class="schk${s.done?' on':''}"></div><span style="${s.done?'text-decoration:line-through;color:var(--ink3)':'color:var(--ink2)'}">${s.t}</span></div>`).join('')}</div></div>`:''}
    ${t.notes?`<div class="blk"><div class="blk-lbl">Notes</div><div style="background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-md);padding:10px 12px;font-size:12px;color:var(--ink2);line-height:1.65">${t.notes}</div></div>`:''}
    <div class="blk"><div class="blk-lbl">Contacts</div><div style="background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-md);padding:4px 10px">${linkedH}</div></div>
    <div class="blk"><div class="blk-lbl">Task activity</div>
      <div style="background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-md);padding:4px 10px">${tLogsH}</div>
    </div>
  </div>`;
  // Log that someone viewed this task
  addTaskLog(t.id,'Task viewed',`"${t.title}"`);
  document.getElementById('tdp-back').classList.add('o');setTimeout(()=>document.getElementById('tdp').classList.add('o'),10);
}
function closeTDP(){document.getElementById('tdp').classList.remove('o');document.getElementById('tdp-back').classList.remove('o');}

// ── EXTERNAL VIEW ────────────────────────────────────────
function openExternal(custId){
  extCustId=custId;extView='list';extWkOff=0;
  document.getElementById('ext-view').classList.add('o');
  const c=gc(custId);
  document.getElementById('ext-title').textContent=c?`${c.name} — Customer Portal`:'Customer Portal';
  document.getElementById('ext-vb-list').classList.add('on');document.getElementById('ext-vb-cal').classList.remove('on');
  addProjectLog('External view opened',gc(custId)?.name||custId,custId);
  renderExternal();
}
function closeExternal(){document.getElementById('ext-view').classList.remove('o');}
function setExtView(v){extView=v;document.getElementById('ext-vb-list').classList.toggle('on',v==='list');document.getElementById('ext-vb-cal').classList.toggle('on',v==='cal');renderExternal();}
function extSrcTasks(){return tasks.filter(t=>t.cust===extCustId&&t.owner==='Shared');}
function renderExternal(){
  const src=extSrcTasks();const open=src.filter(t=>t.status==='open'),done=src.filter(t=>t.status==='completed');let h='';
  if(extView==='list'){
    h+=`<div style="margin-bottom:16px"><div style="font-size:18px;font-weight:600;color:var(--ink);margin-bottom:4px">Shared tasks</div><div style="font-size:13px;color:var(--ink3)">${open.length} open · ${done.length} completed</div></div>`;
    if(!src.length){h+=`<div style="text-align:center;padding:48px;color:var(--ink3);font-size:13px">No shared tasks at this time.</div>`;}
    else{if(open.length){h+=`<div class="sec-hd" style="margin-top:0">Open — ${open.length}</div>`;PRIS.forEach(p=>open.filter(t=>t.pri===p).forEach(t=>{h+=buildTaskRow(t,false,true);}));}if(done.length){h+=`<div class="sec-hd" style="margin-top:14px">Completed — ${done.length}</div>`;done.forEach(t=>{h+=buildTaskRow(t,false,true);});}}
  } else {
    const days=getWkDays(extWkOff);const wkLbl=`${MS[days[0].getMonth()]} ${days[0].getDate()} — ${MS[days[6].getMonth()]} ${days[6].getDate()}, ${days[6].getFullYear()}`;
    h+=`<div style="display:flex;justify-content:flex-end;margin-bottom:13px"><div class="wk-nav"><button class="wk-btn" onclick="extWkOff--;renderExternal()"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="7.5,2.5 3.5,6 7.5,9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button><div class="wk-lbl">${wkLbl}</div><button class="wk-btn" onclick="extWkOff++;renderExternal()"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><polyline points="4.5,2.5 8.5,6 4.5,9.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg></button></div></div>`;
    h+=buildWeekCal(src,days,false);
  }
  document.getElementById('ext-body').innerHTML=h;
}
function openExtTDP(id){
  const t=tasks.find(x=>x.id===id);if(!t)return;const dn=t.status==='completed',prog=Math.round(t.prog);const {dc,dt}=dueMeta(t.due);
  addTaskLog(t.id,'Task viewed (external)',`"${t.title}"`);
  document.getElementById('ext-body').innerHTML=`<button class="btn sm" style="margin-bottom:14px" onclick="renderExternal()">← Back to tasks</button>
  <div style="background:var(--bg2);border:1px solid var(--line);border-radius:var(--r-xl);padding:16px">
    <div style="display:flex;gap:7px;flex-wrap:wrap;margin-bottom:8px">${priTag(t.pri)}<span class="tag" style="background:${dn?'var(--green-lt)':'var(--blue-lt)'};color:${dn?'var(--green)':'var(--blue)'}">${dn?'Completed':'Open'}</span></div>
    <div style="font-size:15px;font-weight:600;color:${dn?'var(--ink3)':'var(--ink)'};${dn?'text-decoration:line-through;':''}margin-bottom:14px">${t.title}</div>
    <div class="dg2" style="margin-bottom:14px">
      <div class="dg-c"><div class="dg-l">Due date</div><div class="dg-v" style="margin-top:4px;color:${dc}">${dt}</div></div>
      <div class="dg-c"><div class="dg-l">Owner</div><div class="dg-v" style="margin-top:4px">${ownerTag(t.owner)}</div></div>
      <div class="dg-c" style="grid-column:1/-1"><div class="dg-l">Progress</div>
        <div style="display:flex;align-items:center;gap:10px;margin-top:4px"><div style="flex:1;height:6px;border-radius:3px;background:var(--line2);overflow:hidden"><div style="height:100%;border-radius:3px;background:var(--blue);width:${prog}%"></div></div><span style="font-size:12px;font-weight:600;color:var(--ink2)">${prog}%</span></div>
      </div>
    </div>
    ${t.ctx?`<div style="background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-md);padding:10px 12px;font-size:12px;color:var(--ink2);line-height:1.65;margin-bottom:14px">${t.ctx}</div>`:''}
    ${t.subs&&t.subs.length?`<div style="background:var(--bg3);border:1px solid var(--line);border-radius:var(--r-md);padding:2px 10px">${t.subs.map(s=>`<div class="sub-row"><div class="schk${s.done?' on':''}"></div><span style="${s.done?'text-decoration:line-through;color:var(--ink3)':'color:var(--ink2)'}">${s.t}</span></div>`).join('')}</div>`:''}
  </div>`;
  /* NOTE: no complete/reopen in external view */
}

// ── BACKUP / RESTORE ────────────────────────────────────
function dlBackup(){
  lastBackup=new Date();
  const data={version:1,exported:lastBackup.toISOString(),customers:custs,contacts,tasks,projectLog,taskLog,customTags:[...customTags]};
  const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:'application/json'}));
  a.download=`successiq-backup-${ds(new Date())}.json`;a.click();
  addProjectLog('Backup downloaded','Full database export','');
  toast('Backup downloaded');renderSB();
}
function restoreBackup(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.customers)custs=d.customers.map(normC);
      if(d.tasks)tasks=d.tasks;
      if(d.contacts)contacts=d.contacts;
      if(d.projectLog)projectLog=d.projectLog;
      if(d.taskLog)taskLog=d.taskLog;
      if(d.customTags){customTags=d.customTags;activeTags=new Set(customTags);}
      lastBackup=d.exported?new Date(d.exported):null;
      curC='all';fPri=[];fOwn=[];fStat='open';sbSegF=[];fTag=null;
      addProjectLog('Backup restored','Database restored from file','');
      toast('Backup restored');render();
    }catch{toast('Error reading backup file');}
  };r.readAsText(file);e.target.value='';
}

// ── ROUTING / STATE ──────────────────────────────────────
function setC(id){curC=id;render();}
function setView(v){curView=v;document.getElementById('vb-list').classList.toggle('on',v==='list');document.getElementById('vb-cal').classList.toggle('on',v==='cal');render();}
function setFS(s){fStat=s;render();}
function togFPri(p){const i=fPri.indexOf(p);i>=0?fPri.splice(i,1):fPri.push(p);render();}
function togFOwn(o){const i=fOwn.indexOf(o);i>=0?fOwn.splice(i,1):fOwn.push(o);render();}
function setTagFilter(tag){fTag=(fTag===tag)?null:tag;render();}
function setSort(field){
  if(sortField===field){
    if(field==='pri'){sortField='pri';sortDir=1;} // reset
    else sortDir*=-1;
  }else{sortField=field;sortDir=1;}
  render();
}
function togSbSeg(id){const i=sbSegF.indexOf(id);i>=0?sbSegF.splice(i,1):sbSegF.push(id);if(curC!=='all'&&curC!=='audit'){const vc=visCusts();if(!vc.find(c=>c.id===curC))curC='all';}render();}
function togCsum(id){sumOpen[id]=!sumOpen[id];render();}
function setCustTab(id,tab){custTab[id]=tab;render();}

function render(){
  renderSB();
  if(curC==='audit'){renderAuditLog();return;}
  curView==='list'?renderList():renderCalendar();
}
render();
</script>
